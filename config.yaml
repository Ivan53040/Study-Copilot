vault:
  root: C:\Users\ivank\Documents\StudyVault
  read_paths:
  - '**'
  write_paths:
  - StudyCopilot/**
  denied_paths:
  - '**/.obsidian/**'
  - '**/.git/**'
  - '**/.env'
  - '**/.ssh/**'
  - '**/.trash/**'
external_sources:
- path: C:/Users/ivank/iCloudDrive/reit exam
  course: REIT6811
  source_type: past-paper
models:
  # Switch the chat model here: lmstudio (local, default) | openai | anthropic | echo.
  # Cloud providers read their API key from the environment (see .env.example).
  default_provider: lmstudio
  lmstudio:
    base_url: http://127.0.0.1:1234/v1
    model: local-model
  # openai:                              # or any OpenAI-compatible gateway
  #   base_url: https://api.openai.com/v1
  #   model: gpt-4o-mini
  #   api_key_env: OPENAI_API_KEY
  # anthropic:                           # Claude (needs `pip install anthropic`)
  #   model: claude-opus-4-8
  #   api_key_env: ANTHROPIC_API_KEY
  #   max_tokens: 4096
  cloud_fallback:
    enabled: false
    require_approval: true
retrieval:
  keyword_limit: 20
  vector_limit: 20
  final_context_limit: 8
generation:
  temperature: 0.1
  require_citations: true
sync:
  enabled: true
  icloud_root: C:/Users/ivank/iCloudDrive/iCloud~md~obsidian/Ivan Kung's Note
  mode: twoway
  run_in_app: false
  interval_minutes: 5
  exclude_dirs:
  - .trash
database_url: sqlite:///./data/study_copilot.db
lectures:
  root: C:\Users\ivank\Documents\Lecture Notes
embeddings:
  provider: lmstudio
  model: text-embedding-nomic-embed-text-v1.5
  base_url: null
